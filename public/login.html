<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HellOOpass Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      /* =================== Root Colors =================== */
      :root {
        --primary-green: #00a884;
        --primary-blue: #0072ce;
        --bg-dark: #0a0a0a;
        --text-light: #f5f5f5;
        --text-dark: #1f1f1f;
        --input-bg: #fff;
        --input-border: #d1d1d1;
      }

      /* =================== Global =================== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg-dark);
        color: var(--text-light);
        overflow: hidden;
      }

      /* =================== Container =================== */
      .login-wrapper {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 20px;
        padding: 2.5rem 2rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        color: var(--text-dark);
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-wrapper h2 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
        text-align: center;
        color: #111;
      }
      .subtitle {
        font-size: 0.9rem;
        color: #666;
        text-align: center;
        margin-bottom: 2rem;
      }

      /* =================== Demo Credentials Card =================== */
      .demo-card {
        background: #f8f9fa;
        border-left: 4px solid var(--primary-green);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 1.8rem;
      }
      .demo-card h4 {
        font-size: 0.8rem;
        text-transform: uppercase;
        color: #555;
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .demo-card h4 i {
        color: var(--primary-green);
      }
      .demo-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
      }
      .demo-item {
        font-size: 0.75rem;
        background: white;
        padding: 0.5rem;
        border-radius: 8px;
        border: 1px solid #eee;
      }
      .demo-item strong {
        color: var(--primary-green);
        display: block;
        font-size: 0.7rem;
      }

      /* =================== Form =================== */
      form {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }
      label {
        font-size: 0.8rem;
        font-weight: 600;
        color: #444;
        margin-bottom: 0.3rem;
        text-transform: uppercase;
      }
      .input-icon {
        position: relative;
      }
      .input-icon i {
        position: absolute;
        top: 50%;
        left: 1rem;
        transform: translateY(-50%);
        color: #999;
        font-size: 0.9rem;
        transition: color 0.3s;
      }
      input {
        width: 100%;
        padding: 0.9rem 1rem 0.9rem 2.7rem;
        border-radius: 14px;
        border: 1px solid var(--input-border);
        font-size: 0.95rem;
        transition: all 0.3s;
        background: var(--input-bg);
        color: var(--text-dark);
      }
      input:focus {
        outline: none;
        border-color: var(--primary-green);
        box-shadow: 0 0 0 2px rgba(0, 168, 132, 0.2);
      }
      input:focus + i {
        color: var(--primary-green);
      }

      /* =================== Button =================== */
      button {
        padding: 0.9rem;
        border: none;
        border-radius: 30px;
        background: linear-gradient(
          90deg,
          var(--primary-green),
          var(--primary-blue)
        );
        color: #fff;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 168, 132, 0.35);
      }
      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      /* =================== Messages =================== */
      .error,
      .success {
        padding: 0.9rem;
        border-radius: 16px;
        font-size: 0.85rem;
        margin-top: 1rem;
        text-align: center;
        display: none;
        animation: slideIn 0.3s ease-out;
      }
      .error {
        background: #ffe6e8;
        color: #b33441;
        border-left: 4px solid #b33441;
      }
      .success {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #155724;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* =================== Footer Links =================== */
      .footer-links {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.85rem;
      }
      .footer-links a {
        color: var(--primary-green);
        text-decoration: none;
        font-weight: 600;
      }
      .footer-links a:hover {
        text-decoration: underline;
      }
      .footer-note {
        margin-top: 1.2rem;
        font-size: 0.7rem;
        text-align: center;
        color: #888;
      }

      /* =================== Loading Spinner =================== */
      .fa-spinner {
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* =================== Responsive =================== */
      @media (max-width: 480px) {
        .login-wrapper {
          padding: 1.8rem 1.2rem;
        }
        .demo-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <h2><i class="fas fa-cloud-sun"></i> HellOOpass</h2>
      <div class="subtitle">Secure API Platform</div>

      <!-- Demo Credentials Card -->
      <div class="demo-card">
        <h4><i class="fas fa-flask"></i> Demo Accounts</h4>
        <div class="demo-grid">
          <div class="demo-item">
            <strong>admin@dube.com</strong>
            password123 <span style="color: #666">(Dube Admin)</span>
          </div>
          <div class="demo-item">
            <strong>viewer@dube.com</strong>
            password123 <span style="color: #666">(Dube Viewer)</span>
          </div>
          <div class="demo-item">
            <strong>wfpadmin@example.com</strong>
            password123 <span style="color: #666">(WFP Admin)</span>
          </div>
          <div class="demo-item">
            <strong>wfpviewer@example.com</strong>
            password123 <span style="color: #666">(WFP Viewer)</span>
          </div>
        </div>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input
              type="email"
              id="email"
              placeholder="admin@dube.com"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <button type="submit" id="loginBtn">
          <span>Sign In</span>
          <i class="fas fa-arrow-right-to-bracket"></i>
        </button>
      </form>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <div class="footer-links">
        Don't have an account? <a href="/register.html">Register here</a>
      </div>
      <div class="footer-note">HellOOpass Global v1.0</div>
    </div>

    <script>
      // ==================== CRITICAL FIX ====================
      // Your backend is on the SAME domain - use relative URLs!
      const API_BASE_URL = ""; // Empty = use same origin

      console.log("🌍 Environment:", window.location.hostname);
      console.log("📡 Using relative URLs - API is on same domain");

      const loginForm = document.getElementById("loginForm");
      const loginBtn = document.getElementById("loginBtn");
      const errorDiv = document.getElementById("error");
      const successDiv = document.getElementById("success");

      function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = "block";
        successDiv.style.display = "none";
        setTimeout(() => (errorDiv.style.display = "none"), 5000);
      }

      function showSuccess(message) {
        successDiv.textContent = message;
        successDiv.style.display = "block";
        errorDiv.style.display = "none";
        setTimeout(() => (successDiv.style.display = "none"), 3000);
      }

      function setLoading(isLoading) {
        if (isLoading) {
          loginBtn.disabled = true;
          loginBtn.innerHTML =
            '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        } else {
          loginBtn.disabled = false;
          loginBtn.innerHTML =
            '<span>Sign In</span> <i class="fas fa-arrow-right-to-bracket"></i>';
        }
      }

      // Pre-fill demo credentials
      document.getElementById("email").addEventListener("focus", function () {
        if (!this.value) {
          this.value = "admin@dube.com";
          document.getElementById("password").value = "password123";
        }
      });

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          showError("Please enter both email and password");
          return;
        }

        setLoading(true);

        try {
          // Use RELATIVE URL - no need for full URL!
          const loginUrl = "/api/auth/login";
          console.log("📡 Sending request to:", loginUrl);

          const res = await fetch(loginUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          console.log("📥 Response status:", res.status);
          const data = await res.json();
          console.log("📦 Response data:", data);

          if (!res.ok) {
            setLoading(false);

            // Better error messages
            if (res.status === 401) {
              showError("Invalid email or password");
            } else if (res.status === 403) {
              showError(data.message || "Your account is pending approval");
            } else if (res.status === 404) {
              showError("Login endpoint not found");
            } else {
              showError(data.message || `Login failed (${res.status})`);
            }
            return;
          }

          // SUCCESS!
          localStorage.setItem("jwt-token", data.tokens.accessToken);
          localStorage.setItem("user", JSON.stringify(data.user));

          showSuccess("Login successful! Redirecting...");

          const role = data.user.role;
          let redirectPath = "/api-docs/dube/viewer";

          if (role === "dube-admin") redirectPath = "/api-docs/dube/admin";
          else if (role === "dube-viewer")
            redirectPath = "/api-docs/dube/viewer";
          else if (role === "wfp-admin") redirectPath = "/api-docs/wfp/admin";
          else if (role === "wfp-viewer") redirectPath = "/api-docs/wfp/viewer";

          setTimeout(() => {
            window.location.href =
              redirectPath +
              "?token=" +
              encodeURIComponent(data.tokens.accessToken);
          }, 1500);
        } catch (err) {
          console.error("❌ Network error:", err);
          setLoading(false);
          showError("Network error. Check console (F12)");
        }
      });
    </script>
  </body>
</html>
