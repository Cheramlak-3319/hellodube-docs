<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HellOOpass Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      /* =================== Root Colors =================== */
      :root {
        --primary-green: #00a884;
        --primary-blue: #0072ce;
        --bg-dark: #0a0a0a;
        --text-light: #f5f5f5;
        --text-dark: #1f1f1f;
        --input-bg: #fff;
        --input-border: #d1d1d1;
        --demo-bg: #f4f4f4;
      }

      /* =================== Global =================== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg-dark);
        color: var(--text-light);
        overflow: hidden;
      }

      /* =================== Container =================== */
      .login-wrapper {
        width: 100%;
        max-width: 480px;
        background: #fff;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        color: var(--text-dark);
      }

      .login-wrapper h2 {
        font-size: 1.9rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        text-align: center;
        color: #111;
      }
      .subtitle {
        font-size: 0.95rem;
        color: #555;
        text-align: center;
        margin-bottom: 1.5rem;
      }

      /* =================== Demo Accounts =================== */
      .demo-credentials {
        background: var(--demo-bg);
        border-left: 4px solid var(--primary-green);
        padding: 1rem 1.2rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
        font-size: 0.85rem;
      }
      .demo-credentials h4 {
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
        font-weight: 600;
      }
      .demo-credentials ul {
        list-style: none;
        padding-left: 0;
        display: grid;
        gap: 0.4rem;
      }
      .demo-credentials li {
        color: #333;
      }
      .demo-credentials strong {
        background: rgba(0, 168, 132, 0.1);
        padding: 0 0.4rem;
        border-radius: 12px;
      }

      /* =================== Form =================== */
      form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .form-group {
        display: flex;
        flex-direction: column;
      }
      label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #444;
        margin-bottom: 0.35rem;
      }
      .input-icon {
        position: relative;
      }
      .input-icon i {
        position: absolute;
        top: 50%;
        left: 0.9rem;
        transform: translateY(-50%);
        color: #999;
        font-size: 0.85rem;
      }
      input {
        width: 100%;
        padding: 0.85rem 1rem 0.85rem 2.7rem;
        border-radius: 14px;
        border: 1px solid var(--input-border);
        font-size: 0.95rem;
        transition: all 0.3s;
        background: var(--input-bg);
        color: var(--text-dark);
      }
      input:focus {
        outline: none;
        border-color: var(--primary-green);
        box-shadow: 0 0 0 2px rgba(0, 168, 132, 0.2);
      }

      /* =================== Button =================== */
      button {
        padding: 0.9rem;
        border: none;
        border-radius: 30px;
        background: linear-gradient(
          90deg,
          var(--primary-green),
          var(--primary-blue)
        );
        color: #fff;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 168, 132, 0.35);
      }

      /* =================== Error =================== */
      .error {
        background: #ffe6e8;
        color: #b33441;
        padding: 0.9rem;
        border-radius: 16px;
        font-size: 0.85rem;
        margin-top: 0.8rem;
        text-align: center;
        display: none;
      }

      /* =================== Footer =================== */
      .footer-note {
        margin-top: 1.5rem;
        font-size: 0.75rem;
        text-align: center;
        color: #888;
      }

      /* =================== Responsive =================== */
      @media (max-width: 520px) {
        .login-wrapper {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
      <div class="subtitle">Access HellOOpass API</div>

      <!-- Demo accounts -->
      <div class="demo-credentials">
        <h4>Demo Accounts</h4>
        <ul>
          <li><strong>admin@dube.com</strong> / password123 (Dube Admin)</li>
          <li><strong>viewer@dube.com</strong> / password123 (Dube Viewer)</li>
          <li>
            <strong>wfpadmin@example.com</strong> / password123 (WFP Admin)
          </li>
          <li>
            <strong>wfpviewer@example.com</strong> / password123 (WFP Viewer)
          </li>
        </ul>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i
            ><input
              type="email"
              id="email"
              placeholder="you@example.com"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i
            ><input
              type="password"
              id="password"
              placeholder="Strong password"
              required
            />
          </div>
        </div>

        <button type="submit">
          Sign In <i class="fas fa-arrow-right-to-bracket"></i>
        </button>
      </form>

      <div id="error" class="error"></div>
      <div class="footer-note">HellOOpass Global . v1.0</div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          try {
            const res = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.message || "Login failed");

            const token = data.tokens.accessToken;
            localStorage.setItem("jwt-token", token);

            const role = data.user.role;
            let swaggerPath = "";
            if (role === "dube-admin") swaggerPath = "/api-docs/dube/admin";
            else if (role === "dube-viewer")
              swaggerPath = "/api-docs/dube/viewer";
            else if (role === "wfp-admin") swaggerPath = "/api-docs/wfp/admin";
            else if (role === "wfp-viewer")
              swaggerPath = "/api-docs/wfp/viewer";

            window.location.href = `${swaggerPath}?token=${encodeURIComponent(token)}`;
          } catch (err) {
            const errorDiv = document.getElementById("error");
            errorDiv.textContent = err.message;
            errorDiv.style.display = "block";
          }
        });
    </script>
  </body>
</html>
