<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>HellOOpass Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      /* =================== Root Colors =================== */
      :root {
        --primary-green: #00a884;
        --primary-blue: #0072ce;
        --bg-dark: #0a0a0a;
        --text-light: #f5f5f5;
        --text-dark: #1f1f1f;
        --input-bg: #fff;
        --input-border: #d1d1d1;
        --error-red: #dc3545;
        --success-green: #28a745;
      }

      /* =================== Global =================== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto,
          sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg-dark);
        color: var(--text-light);
        padding: 1rem;
      }

      /* =================== Login Container =================== */
      .login-wrapper {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 24px;
        padding: 2rem 1.5rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        color: var(--text-dark);
        animation: fadeIn 0.5s ease-out;
        margin: 1rem;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-wrapper h2 {
        font-size: clamp(1.8rem, 6vw, 2rem);
        font-weight: 700;
        margin-bottom: 0.25rem;
        text-align: center;
        color: #111;
      }

      .subtitle {
        font-size: clamp(0.8rem, 4vw, 0.9rem);
        color: #666;
        text-align: center;
        margin-bottom: 1.5rem;
      }

      /* =================== Form =================== */
      form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      label {
        font-size: 0.8rem;
        font-weight: 600;
        color: #444;
        margin-bottom: 0.3rem;
        text-transform: uppercase;
      }

      .input-icon {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-icon i {
        position: absolute;
        left: 1rem;
        color: #999;
        font-size: 1rem;
        z-index: 1;
      }

      input {
        width: 100%;
        padding: 0.9rem 1rem 0.9rem 2.7rem;
        border-radius: 14px;
        border: 1.5px solid var(--input-border);
        font-size: 1rem;
        transition: all 0.3s;
        background: var(--input-bg);
        color: var(--text-dark);
        -webkit-appearance: none;
      }

      input:focus {
        outline: none;
        border-color: var(--primary-green);
        box-shadow: 0 0 0 3px rgba(0, 168, 132, 0.15);
      }

      /* =================== Login Button =================== */
      .login-btn {
        padding: 1rem;
        border: none;
        border-radius: 40px;
        background: linear-gradient(
          90deg,
          var(--primary-green),
          var(--primary-blue)
        );
        color: #fff;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
        width: 100%;
        -webkit-tap-highlight-color: transparent;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 168, 132, 0.35);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .login-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      /* =================== Messages =================== */
      .error,
      .success {
        padding: 0.9rem;
        border-radius: 16px;
        font-size: 0.9rem;
        margin-top: 1rem;
        text-align: center;
        display: none;
        animation: slideIn 0.3s ease-out;
        word-break: break-word;
      }

      .error {
        background: #ffe6e8;
        color: #b33441;
        border-left: 4px solid #b33441;
      }

      .success {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #155724;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 🔥 FIXED: Password field with toggle button - INSIDE the input */
      .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
      }

      .password-wrapper input {
        width: 100%;
        padding-right: 3.5rem !important; /* Make room for the button */
      }

      .password-toggle {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #999;
        font-size: 1.2rem;
        padding: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s;
        z-index: 5;
        -webkit-tap-highlight-color: transparent;
        line-height: 1;
      }

      .password-toggle:hover {
        color: var(--primary-green);
      }

      .password-toggle:active {
        transform: translateY(-50%) scale(0.95);
      }

      /* Mobile optimization */
      @media (max-width: 480px) {
        .password-toggle {
          font-size: 1.1rem;
          right: 0.8rem;
          padding: 0.4rem;
        }

        .password-wrapper input {
          padding-right: 3.2rem !important;
        }
      }

      /* Prevent zoom on iOS */
      @supports (-webkit-touch-callout: none) {
        .password-toggle {
          font-size: 16px !important;
        }
      }

      /* =================== Footer =================== */
      .footer-links {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.9rem;
      }

      .footer-links a {
        color: var(--primary-green);
        text-decoration: none;
        font-weight: 600;
        padding: 0.5rem;
        display: inline-block;
      }

      .footer-links a:hover {
        text-decoration: underline;
      }

      .footer-note {
        margin-top: 1rem;
        font-size: 0.7rem;
        text-align: center;
        color: #888;
      }

      /* =================== Loading Spinner =================== */
      .fa-spinner {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* =================== Mobile Optimizations =================== */
      @media (max-width: 480px) {
        .login-wrapper {
          padding: 1.5rem 1rem;
          border-radius: 20px;
        }

        .demo-grid {
          grid-template-columns: 1fr;
        }

        .demo-item {
          font-size: 0.8rem;
        }

        input {
          font-size: 16px;
          padding: 0.8rem 1rem 0.8rem 2.5rem;
        }

        .login-btn {
          padding: 0.9rem;
        }
      }

      /* =================== Touch-friendly targets =================== */
      button,
      a,
      input {
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <!-- Login Container -->
    <div class="login-wrapper">
      <h2><i class="fas fa-cloud-sun"></i> HellOOpass</h2>
      <div class="subtitle">Secure API Platform</div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input
              type="email"
              id="email"
              placeholder="admin@dube.com"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <i
              class="fas fa-lock"
              style="position: absolute; left: 1rem; color: #999; z-index: 1"
            ></i>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
            <button type="button" class="password-toggle" id="togglePassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span>Sign In</span>
          <i class="fas fa-arrow-right-to-bracket"></i>
        </button>
      </form>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <div class="footer-links">
        Don't have an account? <a href="/register.html">Register here</a>
      </div>
      <div class="footer-note">HellOOpass Global v1.0</div>
    </div>

    <script>
      // ==================== Wait for DOM to load ====================
      document.addEventListener("DOMContentLoaded", function () {
        // ==================== DOM Elements ====================
        const loginForm = document.getElementById("loginForm");
        const loginBtn = document.getElementById("loginBtn");
        const errorDiv = document.getElementById("error");
        const successDiv = document.getElementById("success");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");

        // ==================== Password Toggle ====================
        if (togglePassword && passwordInput) {
          togglePassword.addEventListener("click", function (e) {
            e.preventDefault(); // Prevent any form submission

            // Toggle the type attribute
            const type =
              passwordInput.getAttribute("type") === "password"
                ? "text"
                : "password";
            passwordInput.setAttribute("type", type);

            // Toggle the eye / eye-slash icon
            this.innerHTML =
              type === "password"
                ? '<i class="fas fa-eye"></i>'
                : '<i class="fas fa-eye-slash"></i>';

            // Keep focus on input for better UX
            passwordInput.focus();
          });
        }

        // ==================== Helper Functions ====================
        function showError(message) {
          errorDiv.textContent = message;
          errorDiv.style.display = "block";
          successDiv.style.display = "none";
          setTimeout(() => (errorDiv.style.display = "none"), 5000);
        }

        function showSuccess(message) {
          successDiv.textContent = message;
          successDiv.style.display = "block";
          errorDiv.style.display = "none";
          setTimeout(() => (successDiv.style.display = "none"), 3000);
        }

        function setLoading(isLoading) {
          if (isLoading) {
            loginBtn.disabled = true;
            loginBtn.innerHTML =
              '<i class="fas fa-spinner fa-spin"></i> Signing in...';
          } else {
            loginBtn.disabled = false;
            loginBtn.innerHTML =
              '<span>Sign In</span> <i class="fas fa-arrow-right-to-bracket"></i>';
          }
        }

        // ==================== Pre-fill Demo Credentials ====================
        emailInput.addEventListener("focus", function () {
          if (!this.value) {
            this.value = "admin@dube.com";
            passwordInput.value = "password123";
          }
        });

        // ==================== Login Form Submit ====================
        loginForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = emailInput.value.trim();
          const password = passwordInput.value;

          if (!email || !password) {
            showError("Please enter both email and password");
            return;
          }

          setLoading(true);

          try {
            const res = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });

            const data = await res.json();

            if (!res.ok) {
              setLoading(false);
              if (res.status === 401) showError("Invalid email or password");
              else if (res.status === 403)
                showError(data.message || "Account pending approval");
              else showError(data.message || `Login failed (${res.status})`);
              return;
            }

            // Store tokens
            localStorage.setItem("jwt-token", data.tokens.accessToken);
            localStorage.setItem("user", JSON.stringify(data.user));
            if (data.tokens.refreshToken) {
              localStorage.setItem("refresh-token", data.tokens.refreshToken);
            }

            showSuccess("Login successful! Redirecting...");

            // Determine redirect path based on role
            const role = data.user.role;
            let redirectPath = "/api-docs/dube/viewer";
            if (role === "dube-admin") redirectPath = "/api-docs/dube/admin";
            else if (role === "dube-viewer")
              redirectPath = "/api-docs/dube/viewer";
            else if (role === "wfp-admin") redirectPath = "/api-docs/wfp/admin";
            else if (role === "wfp-viewer")
              redirectPath = "/api-docs/wfp/viewer";

            setTimeout(() => {
              window.location.href =
                redirectPath +
                "?token=" +
                encodeURIComponent(data.tokens.accessToken);
            }, 1500);
          } catch (err) {
            console.error("Login error:", err);
            setLoading(false);
            showError("Network error. Please try again.");
          }
        });

        // ==================== Mobile Optimization ====================
        // Prevent zoom on input focus for iOS
        if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
          document.querySelectorAll("input").forEach((input) => {
            input.addEventListener("focus", function () {
              this.style.fontSize = "16px";
            });
          });
        }
      });
    </script>
  </body>
</html>
