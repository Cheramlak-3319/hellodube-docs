<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>HellOOpass · Pending Approvals</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
      }

      body {
        background: linear-gradient(145deg, #0a1929 0%, #1a3a4a 100%);
        min-height: 100vh;
        padding: 1rem;
      }

      @media (min-width: 768px) {
        body {
          padding: 2rem;
        }
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      /* ==================== HEADER ==================== */
      .header {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        color: white;
      }

      @media (min-width: 480px) {
        .header {
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
          gap: 0;
          margin-bottom: 2rem;
        }
      }

      .header h1 {
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }

      @media (min-width: 480px) {
        .header h1 {
          font-size: 1.8rem;
        }
      }

      .header h1 i {
        color: #00a884;
      }

      .header-right {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.8rem;
      }

      .user-badge {
        background: #00a884;
        padding: 0.3rem 1rem;
        border-radius: 30px;
        font-size: 0.8rem;
        font-weight: 600;
        word-break: break-word;
        max-width: 200px;
      }

      @media (min-width: 480px) {
        .user-badge {
          max-width: none;
        }
      }

      .logout-btn {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 0.5rem 1.2rem;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        -webkit-tap-highlight-color: transparent;
      }

      .logout-btn:active {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(0.95);
      }

      /* ==================== STATS CARDS ==================== */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      @media (min-width: 640px) {
        .stats-grid {
          grid-template-columns: repeat(4, 1fr);
          gap: 1.5rem;
          margin-bottom: 2rem;
        }
      }

      .stat-card {
        background: white;
        border-radius: 16px;
        padding: 1rem;
        display: flex;
        align-items: center;
        gap: 0.8rem;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      @media (min-width: 480px) {
        .stat-card {
          padding: 1.5rem;
          gap: 1rem;
        }
      }

      .stat-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #00a884, #0072ce);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      @media (min-width: 480px) {
        .stat-icon {
          width: 50px;
          height: 50px;
          border-radius: 15px;
        }
      }

      .stat-icon i {
        font-size: 1.2rem;
        color: white;
      }

      @media (min-width: 480px) {
        .stat-icon i {
          font-size: 1.5rem;
        }
      }

      .stat-info {
        min-width: 0; /* Prevents overflow */
      }

      .stat-info h3 {
        font-size: 0.7rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }

      @media (min-width: 480px) {
        .stat-info h3 {
          font-size: 0.8rem;
        }
      }

      .stat-info p {
        font-size: 1.2rem;
        font-weight: 700;
        color: #1e293b;
        line-height: 1.2;
      }

      @media (min-width: 480px) {
        .stat-info p {
          font-size: 1.8rem;
        }
      }

      /* ==================== FILTERS ==================== */
      .filters {
        background: white;
        border-radius: 20px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      @media (min-width: 640px) {
        .filters {
          flex-direction: row;
          padding: 1.5rem;
          margin-bottom: 2rem;
        }
      }

      .search-box {
        flex: 1;
        min-width: 0;
        position: relative;
      }

      .search-box i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 1rem;
        pointer-events: none;
      }

      .search-box input {
        width: 100%;
        padding: 0.8rem 1rem 0.8rem 2.8rem;
        border: 2px solid #e2e8f0;
        border-radius: 40px;
        font-size: 16px; /* Prevents zoom on iOS */
        transition: border 0.2s;
        -webkit-appearance: none;
      }

      .search-box input:focus {
        outline: none;
        border-color: #00a884;
      }

      .refresh-btn {
        padding: 0.8rem 1.5rem;
        background: #00a884;
        color: white;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        -webkit-tap-highlight-color: transparent;
        min-height: 44px; /* Touch-friendly */
      }

      .refresh-btn:active {
        transform: scale(0.95);
      }

      /* ==================== USERS TABLE ==================== */
      .users-table {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      /* Mobile: Card layout instead of table */
      .mobile-cards {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      .user-card {
        background: #f8fafc;
        border-radius: 16px;
        padding: 1rem;
        border: 1px solid #e2e8f0;
      }

      .user-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.8rem;
      }

      .user-card-info {
        display: flex;
        gap: 0.8rem;
        align-items: center;
      }

      .user-card-avatar {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #00a884, #0072ce);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 1.2rem;
        flex-shrink: 0;
      }

      .user-card-details {
        min-width: 0; /* Prevents overflow */
      }

      .user-card-name {
        font-weight: 600;
        color: #1e293b;
        font-size: 1rem;
        margin-bottom: 0.2rem;
      }

      .user-card-email {
        font-size: 0.8rem;
        color: #64748b;
        word-break: break-word;
      }

      .user-card-badge {
        background: #fef3c7;
        color: #92400e;
        padding: 0.3rem 0.8rem;
        border-radius: 30px;
        font-size: 0.7rem;
        font-weight: 600;
        display: inline-block;
      }

      .user-card-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 0.8rem 0;
        padding: 0.5rem 0;
        border-top: 1px solid #e2e8f0;
        border-bottom: 1px solid #e2e8f0;
      }

      .user-card-date {
        color: #64748b;
        font-size: 0.8rem;
      }

      .user-card-actions {
        display: flex;
        gap: 0.5rem;
      }

      .user-card-actions button {
        flex: 1;
        padding: 0.8rem;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        -webkit-tap-highlight-color: transparent;
      }

      .user-card-actions button:active {
        transform: scale(0.95);
      }

      .card-approve {
        background: #10b981;
        color: white;
      }

      .card-reject {
        background: #ef4444;
        color: white;
      }

      /* Desktop table styles */
      .desktop-table {
        display: none;
      }

      @media (min-width: 768px) {
        .mobile-cards {
          display: none;
        }

        .desktop-table {
          display: block;
          overflow-x: auto;
        }

        table {
          width: 100%;
          border-collapse: collapse;
          min-width: 600px;
        }

        th {
          background: #f8fafc;
          padding: 1rem;
          text-align: left;
          font-size: 0.8rem;
          font-weight: 600;
          color: #475569;
          text-transform: uppercase;
        }

        td {
          padding: 1rem;
          border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
          background: #f8fafc;
        }

        .user-info {
          display: flex;
          align-items: center;
          gap: 0.8rem;
        }

        .user-avatar {
          width: 40px;
          height: 40px;
          background: linear-gradient(135deg, #00a884, #0072ce);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          font-weight: 600;
          flex-shrink: 0;
        }

        .user-details {
          display: flex;
          flex-direction: column;
          min-width: 0;
        }

        .user-name {
          font-weight: 600;
          color: #1e293b;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .user-email {
          font-size: 0.8rem;
          color: #64748b;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .badge {
          padding: 0.3rem 0.8rem;
          border-radius: 30px;
          font-size: 0.7rem;
          font-weight: 600;
          display: inline-block;
        }

        .badge.pending {
          background: #fef3c7;
          color: #92400e;
        }

        .action-btns {
          display: flex;
          gap: 0.5rem;
        }

        .approve-btn,
        .reject-btn {
          padding: 0.5rem 1rem;
          color: white;
          border: none;
          border-radius: 30px;
          cursor: pointer;
          font-size: 0.8rem;
          display: flex;
          align-items: center;
          gap: 0.3rem;
          -webkit-tap-highlight-color: transparent;
        }

        .approve-btn {
          background: #10b981;
        }

        .reject-btn {
          background: #ef4444;
        }
      }

      /* ==================== MODAL ==================== */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 1rem;
      }

      .modal-content {
        background: white;
        border-radius: 24px;
        padding: 1.5rem;
        max-width: 500px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
      }

      @media (min-width: 480px) {
        .modal-content {
          padding: 2rem;
        }
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .modal-header h2 {
        color: #1e293b;
        font-size: 1.3rem;
      }

      .close-modal {
        background: none;
        border: none;
        font-size: 1.8rem;
        cursor: pointer;
        color: #64748b;
        padding: 0.5rem;
        line-height: 1;
        -webkit-tap-highlight-color: transparent;
      }

      .role-select {
        width: 100%;
        padding: 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 16px;
        margin: 1rem 0;
        font-size: 1rem;
        cursor: pointer;
        background: white;
      }

      textarea.role-select {
        resize: vertical;
        min-height: 80px;
      }

      .modal-actions {
        display: flex;
        gap: 1rem;
        margin-top: 1.5rem;
        flex-direction: column;
      }

      @media (min-width: 480px) {
        .modal-actions {
          flex-direction: row;
        }
      }

      .confirm-btn,
      .cancel-btn {
        flex: 1;
        padding: 1rem;
        color: white;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        -webkit-tap-highlight-color: transparent;
      }

      .confirm-btn {
        background: #10b981;
      }

      .cancel-btn {
        background: #ef4444;
      }

      .confirm-btn:active,
      .cancel-btn:active {
        transform: scale(0.95);
      }

      /* ==================== LOADING & EMPTY STATES ==================== */
      .loading {
        text-align: center;
        padding: 3rem 1rem;
        color: #64748b;
      }

      .loading i {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #00a884;
      }

      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
      }

      .empty-state i {
        font-size: 3rem;
        color: #00a884;
        margin-bottom: 1rem;
      }

      @media (min-width: 480px) {
        .empty-state i {
          font-size: 4rem;
        }
      }

      .empty-state h3 {
        color: #1e293b;
        margin-bottom: 0.5rem;
      }

      .empty-state p {
        color: #64748b;
      }

      /* ==================== TOAST ==================== */
      .toast {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        left: 1rem;
        margin: 0 auto;
        max-width: 400px;
        background: white;
        border-radius: 50px;
        padding: 1rem 1.5rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: center;
        gap: 1rem;
        z-index: 1001;
        animation: slideUp 0.3s;
        border-left: 4px solid;
      }

      @media (min-width: 480px) {
        .toast {
          left: auto;
          right: 2rem;
          bottom: 2rem;
        }
      }

      .toast.success {
        border-left-color: #10b981;
      }

      .toast.error {
        border-left-color: #ef4444;
      }

      @keyframes slideUp {
        from {
          transform: translateY(100%);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .hidden {
        display: none !important;
      }

      /* Touch-friendly targets */
      button,
      select,
      input {
        touch-action: manipulation;
      }

      /* Prevent zoom on iOS */
      @supports (-webkit-touch-callout: none) {
        input,
        select,
        textarea,
        button {
          font-size: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>
          <i class="fas fa-cloud-sun"></i>
          Pending Approvals
        </h1>
        <div class="header-right">
          <span class="user-badge" id="userInfo">Loading...</span>
          <button class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">
            <i class="fas fa-clock"></i>
          </div>
          <div class="stat-info">
            <h3>Pending</h3>
            <p id="pendingCount">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <i class="fas fa-check-circle"></i>
          </div>
          <div class="stat-info">
            <h3>Today</h3>
            <p id="approvedToday">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <i class="fas fa-users"></i>
          </div>
          <div class="stat-info">
            <h3>Total</h3>
            <p id="totalUsers">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <i class="fas fa-chart-line"></i>
          </div>
          <div class="stat-info">
            <h3>Week</h3>
            <p id="weeklyRegistrations">0</p>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name or email..."
          />
        </div>
        <button class="refresh-btn" id="refreshBtn">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>

      <!-- Users Container -->
      <div class="users-table">
        <!-- Loading State -->
        <div id="loadingState" class="loading">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading pending users...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
          <i class="fas fa-check-circle"></i>
          <h3>All Caught Up!</h3>
          <p>No pending approvals at the moment</p>
        </div>

        <!-- Mobile Cards View -->
        <div id="mobileCardsContainer" class="mobile-cards hidden"></div>

        <!-- Desktop Table View -->
        <div id="desktopTableContainer" class="desktop-table hidden">
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Registered</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Approve Modal with Role Selection -->
    <div id="approveModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Approve User</h2>
          <button class="close-modal" id="closeApproveModal">&times;</button>
        </div>
        <p>Select role for <span id="approveUserName"></span></p>
        <select class="role-select" id="approveRoleSelect">
          <option value="dube-viewer">👤 Dube Viewer (Read-only)</option>
          <option value="dube-admin">👑 Dube Admin (Full access)</option>
          <option value="wfp-viewer">🌍 WFP Viewer (Read-only)</option>
          <option value="wfp-admin">🌟 WFP Admin (Full access)</option>
        </select>
        <div class="modal-actions">
          <button class="confirm-btn" id="confirmApproveBtn">
            <i class="fas fa-check"></i> Confirm
          </button>
          <button class="cancel-btn" id="cancelApproveBtn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Reject Modal -->
    <div id="rejectModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Reject User</h2>
          <button class="close-modal" id="closeRejectModal">&times;</button>
        </div>
        <p>Reject <span id="rejectUserName"></span>?</p>
        <textarea
          id="rejectReason"
          class="role-select"
          placeholder="Reason for rejection (optional)"
          rows="3"
        ></textarea>
        <div class="modal-actions">
          <button class="confirm-btn" id="confirmRejectBtn">
            <i class="fas fa-times"></i> Confirm Reject
          </button>
          <button class="cancel-btn" id="cancelRejectBtn">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      // ==================== State ====================
      let currentUser = null;
      let selectedUserId = null;
      let pendingUsers = [];

      // DOM Elements
      const loadingState = document.getElementById("loadingState");
      const emptyState = document.getElementById("emptyState");
      const mobileCardsContainer = document.getElementById(
        "mobileCardsContainer",
      );
      const desktopTableContainer = document.getElementById(
        "desktopTableContainer",
      );
      const usersTableBody = document.getElementById("usersTableBody");
      const searchInput = document.getElementById("searchInput");
      const refreshBtn = document.getElementById("refreshBtn");

      // ==================== Check Auth ====================
      (async function () {
        const token = localStorage.getItem("jwt-token");

        if (!token) {
          window.location.href = "/login.html";
          return;
        }

        try {
          const base64Url = token.split(".")[1];
          const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
          const payload = JSON.parse(atob(base64));

          document.getElementById("userInfo").textContent =
            `${payload.email || "User"} (${payload.role || "user"})`;
          currentUser = payload;

          await Promise.all([loadPendingUsers(), loadStats()]);
        } catch (error) {
          console.error("Auth error:", error);
          window.location.href = "/login.html";
        }
      })();

      // ==================== Load Stats ====================
      async function loadStats() {
        try {
          const token = localStorage.getItem("jwt-token");

          const [pendingRes, usersRes, weeklyRes, todayRes] = await Promise.all(
            [
              fetch("/api/admin/pending-users", {
                headers: { Authorization: `Bearer ${token}` },
              }),
              fetch("/api/admin/users/count", {
                headers: { Authorization: `Bearer ${token}` },
              }),
              fetch("/api/admin/registrations/weekly", {
                headers: { Authorization: `Bearer ${token}` },
              }),
              fetch("/api/admin/approvals/today", {
                headers: { Authorization: `Bearer ${token}` },
              }),
            ],
          );

          const pendingData = await pendingRes.json();
          const usersData = await usersRes.json();
          const weeklyData = await weeklyRes.json();
          const todayData = await todayRes.json();

          document.getElementById("pendingCount").textContent =
            pendingData.count || 0;
          document.getElementById("totalUsers").textContent =
            usersData.count || 0;
          document.getElementById("weeklyRegistrations").textContent =
            weeklyData.count || 0;
          document.getElementById("approvedToday").textContent =
            todayData.count || 0;
        } catch (error) {
          console.error("Error loading stats:", error);
        }
      }

      // ==================== Load Pending Users ====================
      async function loadPendingUsers() {
        try {
          loadingState.classList.remove("hidden");
          emptyState.classList.add("hidden");
          mobileCardsContainer.classList.add("hidden");
          desktopTableContainer.classList.add("hidden");

          const token = localStorage.getItem("jwt-token");
          const response = await fetch("/api/admin/pending-users", {
            headers: { Authorization: `Bearer ${token}` },
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || "Failed to load users");
          }

          pendingUsers = data.users || [];

          loadingState.classList.add("hidden");

          if (pendingUsers.length === 0) {
            emptyState.classList.remove("hidden");
          } else {
            renderUsers();
          }
        } catch (error) {
          console.error("Error loading users:", error);
          showToast(error.message, "error");
          loadingState.classList.add("hidden");
        }
      }

      // ==================== Render Users (Mobile Cards or Desktop Table) ====================
      function renderUsers() {
        const isMobile = window.innerWidth < 768;

        if (isMobile) {
          renderMobileCards();
          mobileCardsContainer.classList.remove("hidden");
          desktopTableContainer.classList.add("hidden");
        } else {
          renderDesktopTable();
          desktopTableContainer.classList.remove("hidden");
          mobileCardsContainer.classList.add("hidden");
        }
      }

      function renderMobileCards() {
        mobileCardsContainer.innerHTML = "";

        pendingUsers.forEach((user) => {
          const registeredDate = new Date(user.createdAt).toLocaleDateString(
            "en-US",
            {
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            },
          );

          const card = document.createElement("div");
          card.className = "user-card";
          card.innerHTML = `
          <div class="user-card-header">
            <div class="user-card-info">
              <div class="user-card-avatar">${user.firstName?.[0] || ""}${user.lastName?.[0] || ""}</div>
              <div class="user-card-details">
                <div class="user-card-name">${user.firstName || ""} ${user.lastName || ""}</div>
                <div class="user-card-email">${user.email || ""}</div>
              </div>
            </div>
            <span class="user-card-badge">Pending</span>
          </div>
          <div class="user-card-meta">
            <span class="user-card-date"><i class="fas fa-calendar"></i> ${registeredDate}</span>
          </div>
          <div class="user-card-actions">
            <button class="card-approve" onclick="openApproveModal('${user._id}', '${user.firstName || ""} ${user.lastName || ""}')">
              <i class="fas fa-check"></i> Approve
            </button>
            <button class="card-reject" onclick="openRejectModal('${user._id}', '${user.firstName || ""} ${user.lastName || ""}')">
              <i class="fas fa-times"></i> Reject
            </button>
          </div>
        `;
          mobileCardsContainer.appendChild(card);
        });
      }

      function renderDesktopTable() {
        usersTableBody.innerHTML = "";

        pendingUsers.forEach((user) => {
          const row = document.createElement("tr");
          const registeredDate = new Date(user.createdAt).toLocaleDateString(
            "en-US",
            {
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            },
          );

          row.innerHTML = `
          <td>
            <div class="user-info">
              <div class="user-avatar">${user.firstName?.[0] || ""}${user.lastName?.[0] || ""}</div>
              <div class="user-details">
                <span class="user-name">${user.firstName || ""} ${user.lastName || ""}</span>
                <span class="user-email">${user.email || ""}</span>
              </div>
            </div>
          </td>
          <td>${registeredDate}</td>
          <td><span class="badge pending">Pending</span></td>
          <td>
            <div class="action-btns">
              <button class="approve-btn" onclick="openApproveModal('${user._id}', '${user.firstName || ""} ${user.lastName || ""}')">
                <i class="fas fa-check"></i> Approve
              </button>
              <button class="reject-btn" onclick="openRejectModal('${user._id}', '${user.firstName || ""} ${user.lastName || ""}')">
                <i class="fas fa-times"></i> Reject
              </button>
            </div>
          </td>
        `;
          usersTableBody.appendChild(row);
        });
      }

      // ==================== Filter Users ====================
      searchInput.addEventListener("input", () => {
        const searchTerm = searchInput.value.toLowerCase();
        const filtered = pendingUsers.filter(
          (user) =>
            user.firstName?.toLowerCase().includes(searchTerm) ||
            user.lastName?.toLowerCase().includes(searchTerm) ||
            user.email?.toLowerCase().includes(searchTerm),
        );

        // Temporarily replace pendingUsers with filtered for rendering
        const originalUsers = [...pendingUsers];
        pendingUsers = filtered;
        renderUsers();
        pendingUsers = originalUsers; // Restore original
      });

      // ==================== Window Resize Handler ====================
      window.addEventListener("resize", () => {
        if (pendingUsers.length > 0) {
          renderUsers();
        }
      });

      // ==================== Refresh ====================
      refreshBtn.addEventListener("click", () => {
        loadPendingUsers();
        loadStats();
      });

      // ==================== Modal Functions ====================
      window.openApproveModal = function (userId, userName) {
        selectedUserId = userId;
        document.getElementById("approveUserName").textContent = userName;
        document.getElementById("approveModal").classList.remove("hidden");
      };

      window.openRejectModal = function (userId, userName) {
        selectedUserId = userId;
        document.getElementById("rejectUserName").textContent = userName;
        document.getElementById("rejectModal").classList.remove("hidden");
      };

      function closeApproveModal() {
        document.getElementById("approveModal").classList.add("hidden");
        selectedUserId = null;
      }

      function closeRejectModal() {
        document.getElementById("rejectModal").classList.add("hidden");
        document.getElementById("rejectReason").value = "";
        selectedUserId = null;
      }

      // Modal button listeners
      document
        .getElementById("closeApproveModal")
        .addEventListener("click", closeApproveModal);
      document
        .getElementById("cancelApproveBtn")
        .addEventListener("click", closeApproveModal);
      document
        .getElementById("closeRejectModal")
        .addEventListener("click", closeRejectModal);
      document
        .getElementById("cancelRejectBtn")
        .addEventListener("click", closeRejectModal);

      // Close modals when clicking outside
      window.addEventListener("click", (event) => {
        if (event.target.classList.contains("modal")) {
          closeApproveModal();
          closeRejectModal();
        }
      });

      // ==================== Approve User ====================
      document
        .getElementById("confirmApproveBtn")
        .addEventListener("click", async () => {
          if (!selectedUserId) return;

          const role = document.getElementById("approveRoleSelect").value;
          const token = localStorage.getItem("jwt-token");

          try {
            const response = await fetch(
              `/api/admin/approve-user/${selectedUserId}`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${token}`,
                },
                body: JSON.stringify({ role }),
              },
            );

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.message || "Approval failed");
            }

            showToast(`User approved as ${role}!`, "success");
            closeApproveModal();
            await Promise.all([loadPendingUsers(), loadStats()]);
          } catch (error) {
            showToast(error.message, "error");
          }
        });

      // ==================== Reject User ====================
      document
        .getElementById("confirmRejectBtn")
        .addEventListener("click", async () => {
          if (!selectedUserId) return;

          const reason = document.getElementById("rejectReason").value;
          const token = localStorage.getItem("jwt-token");

          try {
            const response = await fetch(
              `/api/admin/reject-user/${selectedUserId}`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${token}`,
                },
                body: JSON.stringify({
                  reason: reason || "No reason provided",
                }),
              },
            );

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.message || "Rejection failed");
            }

            showToast("User rejected", "success");
            closeRejectModal();
            await Promise.all([loadPendingUsers(), loadStats()]);
          } catch (error) {
            showToast(error.message, "error");
          }
        });

      // ==================== Toast ====================
      function showToast(message, type) {
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `
        <i class="fas ${type === "success" ? "fa-check-circle" : "fa-exclamation-circle"}"></i>
        <span>${message}</span>
      `;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      // ==================== Logout ====================
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("jwt-token");
        localStorage.removeItem("user");
        window.location.href = "/login.html";
      });
    </script>
  </body>
</html>
