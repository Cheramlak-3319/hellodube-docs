<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HellOOpass · Admin Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: linear-gradient(145deg, #0a1929 0%, #1a3a4a 100%);
        min-height: 100vh;
        padding: 2rem;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        color: white;
        will-change: transform;
      }

      .header h1 {
        font-size: 1.8rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .header h1 i {
        color: #00a884;
      }

      .admin-badge {
        background: #00a884;
        padding: 0.3rem 1rem;
        border-radius: 30px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .logout-btn {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 0.5rem 1.5rem;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .logout-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      /* Stats Cards - Ultra Fast */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1.5rem;
        margin-bottom: 2rem;
        contain: content;
      }

      .stat-card {
        background: white;
        border-radius: 20px;
        padding: 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transform: translateZ(0);
        backface-visibility: hidden;
      }

      .stat-icon {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #00a884, #0072ce);
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .stat-icon i {
        font-size: 1.5rem;
        color: white;
      }

      .stat-info h3 {
        font-size: 0.8rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stat-info p {
        font-size: 1.8rem;
        font-weight: 700;
        color: #1e293b;
        line-height: 1.2;
      }

      /* Skeleton Loader - Ultra Lightweight */
      .skeleton-pulse {
        background: linear-gradient(
          90deg,
          #f0f0f0 25%,
          #e0e0e0 50%,
          #f0f0f0 75%
        );
        background-size: 200% 100%;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
        100% {
          opacity: 1;
        }
      }

      .stat-skeleton {
        height: 40px;
        width: 80px;
        border-radius: 8px;
      }

      /* Filters */
      .filters {
        background: white;
        border-radius: 20px;
        padding: 1.5rem;
        margin-bottom: 2rem;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        contain: content;
      }

      .search-box {
        flex: 1;
        min-width: 250px;
        position: relative;
      }

      .search-box i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        pointer-events: none;
      }

      .search-box input {
        width: 100%;
        padding: 0.8rem 1rem 0.8rem 2.8rem;
        border: 2px solid #e2e8f0;
        border-radius: 40px;
        font-size: 0.95rem;
        transition: border 0.2s;
      }

      .search-box input:focus {
        outline: none;
        border-color: #00a884;
      }

      .filter-select {
        padding: 0.8rem 2rem;
        border: 2px solid #e2e8f0;
        border-radius: 40px;
        background: white;
        cursor: pointer;
      }

      .refresh-btn {
        padding: 0.8rem 2rem;
        background: #00a884;
        color: white;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: background 0.2s;
      }

      .refresh-btn:hover {
        background: #008f6b;
      }

      .refresh-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* Virtual Scroll Container */
      .table-container {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-height: 600px;
        overflow-y: auto;
        contain: strict;
      }

      .virtual-scroll {
        position: relative;
        width: 100%;
      }

      .virtual-scroll-row {
        position: absolute;
        left: 0;
        right: 0;
        will-change: transform;
        background: white;
        border-bottom: 1px solid #e2e8f0;
      }

      .virtual-scroll-row:hover {
        background: #f8fafc;
      }

      .virtual-scroll-header {
        position: sticky;
        top: 0;
        background: #f8fafc;
        padding: 1rem;
        display: grid;
        grid-template-columns: 2fr 1fr 0.8fr 0.8fr 1.5fr;
        font-weight: 600;
        color: #475569;
        text-transform: uppercase;
        font-size: 0.8rem;
        z-index: 2;
        border-bottom: 2px solid #e2e8f0;
      }

      .row-content {
        padding: 1rem;
        display: grid;
        grid-template-columns: 2fr 1fr 0.8fr 0.8fr 1.5fr;
        align-items: center;
        gap: 1rem;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }

      .user-avatar {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #00a884, #0072ce);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
      }

      .user-details {
        display: flex;
        flex-direction: column;
      }

      .user-name {
        font-weight: 600;
        color: #1e293b;
      }

      .user-email {
        font-size: 0.8rem;
        color: #64748b;
      }

      .badge {
        padding: 0.3rem 0.8rem;
        border-radius: 30px;
        font-size: 0.7rem;
        font-weight: 600;
        display: inline-block;
      }

      .badge.pending {
        background: #fef3c7;
        color: #92400e;
      }

      .action-btns {
        display: flex;
        gap: 0.5rem;
      }

      .approve-btn {
        padding: 0.5rem 1rem;
        background: #10b981;
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .reject-btn {
        padding: 0.5rem 1rem;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      /* Loading States */
      .loading {
        text-align: center;
        padding: 3rem;
        color: #64748b;
      }

      .loading i {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #00a884;
      }

      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
      }

      .empty-state i {
        font-size: 4rem;
        color: #00a884;
        margin-bottom: 1rem;
      }

      .hidden {
        display: none;
      }

      /* Modal */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal-content {
        background: white;
        border-radius: 30px;
        padding: 2rem;
        max-width: 500px;
        width: 90%;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .close-modal {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #64748b;
      }

      .role-select {
        width: 100%;
        padding: 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 16px;
        margin: 1rem 0;
      }

      .modal-actions {
        display: flex;
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .confirm-btn {
        flex: 1;
        padding: 1rem;
        background: #10b981;
        color: white;
        border: none;
        border-radius: 40px;
        cursor: pointer;
      }

      .cancel-btn {
        flex: 1;
        padding: 1rem;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 40px;
        cursor: pointer;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: white;
        border-radius: 50px;
        padding: 1rem 1.5rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: center;
        gap: 1rem;
        z-index: 1001;
        border-left: 4px solid;
      }

      .toast.success {
        border-left-color: #10b981;
      }
      .toast.error {
        border-left-color: #ef4444;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>
          <i class="fas fa-cloud-sun"></i>
          Admin Dashboard
        </h1>
        <div>
          <span class="admin-badge" id="adminRole">Loading...</span>
          <button class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid" id="statsGrid"></div>

      <!-- Filters -->
      <div class="filters">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search..." />
        </div>
        <select class="filter-select" id="roleFilter">
          <option value="all">All Roles</option>
          <option value="dube-admin">Dube Admin</option>
          <option value="dube-viewer">Dube Viewer</option>
          <option value="wfp-admin">WFP Admin</option>
          <option value="wfp-viewer">WFP Viewer</option>
        </select>
        <button class="refresh-btn" id="refreshBtn">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>

      <!-- Virtual Scroll Table -->
      <div class="table-container" id="tableContainer">
        <div id="loadingState" class="loading">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading...</p>
        </div>

        <div id="emptyState" class="empty-state hidden">
          <i class="fas fa-check-circle"></i>
          <h3>All Caught Up!</h3>
          <p>No pending approvals</p>
        </div>

        <div id="virtualScrollContainer" class="virtual-scroll hidden"></div>
      </div>
    </div>

    <!-- Modals (unchanged) -->
    <div id="approveModal" class="modal hidden">
      [modal content same as before]
    </div>
    <div id="rejectModal" class="modal hidden">
      [modal content same as before]
    </div>

    <script>
      (function () {
        "use strict";

        // ==================== Configuration ====================
        const CONFIG = {
          ROW_HEIGHT: 80,
          BUFFER_SIZE: 10,
          VISIBLE_ROWS: 10,
        };

        // ==================== State ====================
        let currentUser = null;
        let selectedUserId = null;
        let pendingUsers = [];
        let filteredUsers = [];
        let stats = {};

        // DOM Elements
        const statsGrid = document.getElementById("statsGrid");
        const loadingState = document.getElementById("loadingState");
        const emptyState = document.getElementById("emptyState");
        const virtualContainer = document.getElementById(
          "virtualScrollContainer",
        );
        const searchInput = document.getElementById("searchInput");
        const roleFilter = document.getElementById("roleFilter");
        const refreshBtn = document.getElementById("refreshBtn");

        // ==================== Authentication ====================
        async function checkAuth() {
          const token = localStorage.getItem("jwt-token");
          if (!token) {
            window.location.href = "/login.html";
            return false;
          }

          try {
            const payload = JSON.parse(
              atob(token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/")),
            );

            const allowedEmails = [
              "Kristalwos@gmail.com",
              "michaeltesfaye2013@gmail.com",
              "cheemanbest@gmail.com",
              "admin@dube.com",
              "zelalemsame@gmail.com",
            ];

            if (!allowedEmails.includes(payload.email)) {
              window.location.href = "/login.html";
              return false;
            }

            document.getElementById("adminRole").textContent =
              payload.role?.replace("-", " ").toUpperCase() || "USER";
            currentUser = payload;
            return true;
          } catch (e) {
            window.location.href = "/login.html";
            return false;
          }
        }

        // ==================== Stats (Simple & Fast) ====================
        function renderSkeletonStats() {
          statsGrid.innerHTML = Array(4)
            .fill(0)
            .map(
              (_, i) => `
          <div class="stat-card">
            <div class="stat-icon"><i class="fas ${["fa-clock", "fa-check-circle", "fa-users", "fa-chart-line"][i]}"></i></div>
            <div class="stat-info">
              <h3>${["Pending", "Approved Today", "Total Users", "This Week"][i]}</h3>
              <div class="skeleton-pulse stat-skeleton"></div>
            </div>
          </div>
        `,
            )
            .join("");
        }

        async function loadStats() {
          const token = localStorage.getItem("jwt-token");
          if (!token) return;

          try {
            const [pending, users, weekly, today] = await Promise.all([
              fetch("/api/admin/pending-users", {
                headers: { Authorization: `Bearer ${token}` },
              }).then((r) => r.json()),
              fetch("/api/admin/users/count", {
                headers: { Authorization: `Bearer ${token}` },
              }).then((r) => r.json()),
              fetch("/api/admin/registrations/weekly", {
                headers: { Authorization: `Bearer ${token}` },
              }).then((r) => r.json()),
              fetch("/api/admin/approvals/today", {
                headers: { Authorization: `Bearer ${token}` },
              }).then((r) => r.json()),
            ]);

            // Update stats with RAF
            requestAnimationFrame(() => {
              statsGrid.innerHTML = [
                {
                  icon: "fa-clock",
                  label: "Pending",
                  value: pending.count || 0,
                },
                {
                  icon: "fa-check-circle",
                  label: "Approved Today",
                  value: today.count || 0,
                },
                {
                  icon: "fa-users",
                  label: "Total Users",
                  value: users.count || 0,
                },
                {
                  icon: "fa-chart-line",
                  label: "This Week",
                  value: weekly.count || 0,
                },
              ]
                .map(
                  (stat) => `
              <div class="stat-card">
                <div class="stat-icon"><i class="fas ${stat.icon}"></i></div>
                <div class="stat-info">
                  <h3>${stat.label}</h3>
                  <p>${stat.value}</p>
                </div>
              </div>
            `,
                )
                .join("");
            });

            return pending.users || [];
          } catch (error) {
            console.error("Stats error:", error);
            return [];
          }
        }

        // ==================== Virtual Scrolling ====================
        class VirtualScroller {
          constructor(container, itemHeight = 80, bufferSize = 10) {
            this.container = container;
            this.itemHeight = itemHeight;
            this.bufferSize = bufferSize;
            this.items = [];
            this.visibleCount =
              Math.ceil(container.clientHeight / itemHeight) + bufferSize * 2;
            this.scrollTop = 0;
            this.totalHeight = 0;

            this.container.style.position = "relative";
            this.container.style.height = "600px";
            this.container.style.overflowY = "auto";

            this.container.addEventListener("scroll", () => {
              requestAnimationFrame(() => this.onScroll());
            });
          }

          setItems(items) {
            this.items = items;
            this.totalHeight = items.length * this.itemHeight;
            this.render();
          }

          onScroll() {
            this.scrollTop = this.container.scrollTop;
            this.render();
          }

          render() {
            const startIndex = Math.max(
              0,
              Math.floor(this.scrollTop / this.itemHeight) - this.bufferSize,
            );
            const endIndex = Math.min(
              this.items.length,
              startIndex + this.visibleCount,
            );

            const fragment = document.createDocumentFragment();

            for (let i = startIndex; i < endIndex; i++) {
              const item = this.items[i];
              const row = document.createElement("div");
              row.className = "virtual-scroll-row";
              row.style.transform = `translateY(${i * this.itemHeight}px)`;
              row.style.height = `${this.itemHeight}px`;

              const registeredDate = new Date(
                item.createdAt,
              ).toLocaleDateString("en-US", {
                month: "short",
                day: "numeric",
                hour: "2-digit",
                minute: "2-digit",
              });

              row.innerHTML = `
              <div class="row-content">
                <div class="user-info">
                  <div class="user-avatar">${item.firstName?.[0] || ""}${item.lastName?.[0] || ""}</div>
                  <div class="user-details">
                    <span class="user-name">${item.firstName || ""} ${item.lastName || ""}</span>
                    <span class="user-email">${item.email || ""}</span>
                  </div>
                </div>
                <div>${registeredDate}</div>
                <div><span class="badge pending">Pending</span></div>
                <div>—</div>
                <div class="action-btns">
                  <button class="approve-btn" onclick="window.approveUser('${item._id}', '${item.firstName || ""} ${item.lastName || ""}')">
                    <i class="fas fa-check"></i> Approve
                  </button>
                  <button class="reject-btn" onclick="window.rejectUser('${item._id}', '${item.firstName || ""} ${item.lastName || ""}')">
                    <i class="fas fa-times"></i> Reject
                  </button>
                </div>
              </div>
            `;

              fragment.appendChild(row);
            }

            // Clear and update
            while (this.container.firstChild) {
              this.container.removeChild(this.container.firstChild);
            }

            this.container.appendChild(fragment);
            this.container.style.height = `${this.totalHeight}px`;
          }
        }

        let scroller = null;

        // ==================== Load Users ====================
        async function loadUsers() {
          loadingState.classList.remove("hidden");
          emptyState.classList.add("hidden");
          virtualContainer.classList.add("hidden");

          const token = localStorage.getItem("jwt-token");
          if (!token) return;

          try {
            const response = await fetch("/api/admin/pending-users", {
              headers: { Authorization: `Bearer ${token}` },
            });

            const data = await response.json();

            if (!response.ok) throw new Error(data.message || "Failed to load");

            pendingUsers = data.users || [];
            filteredUsers = [...pendingUsers];

            requestAnimationFrame(() => {
              loadingState.classList.add("hidden");

              if (filteredUsers.length === 0) {
                emptyState.classList.remove("hidden");
                virtualContainer.classList.add("hidden");
              } else {
                emptyState.classList.add("hidden");
                virtualContainer.classList.remove("hidden");

                if (!scroller) {
                  scroller = new VirtualScroller(virtualContainer, 80, 10);
                }
                scroller.setItems(filteredUsers);
              }
            });
          } catch (error) {
            showToast(error.message, "error");
            loadingState.classList.add("hidden");
          }
        }

        // ==================== Filter (Debounced) ====================
        let filterTimeout;
        function filterUsers() {
          clearTimeout(filterTimeout);
          filterTimeout = setTimeout(() => {
            const searchTerm = searchInput.value.toLowerCase();
            const role = roleFilter.value;

            filteredUsers = pendingUsers.filter((user) => {
              const matchesSearch =
                user.firstName?.toLowerCase().includes(searchTerm) ||
                false ||
                user.lastName?.toLowerCase().includes(searchTerm) ||
                false ||
                user.email?.toLowerCase().includes(searchTerm) ||
                false;

              return matchesSearch;
            });

            if (scroller) {
              scroller.setItems(filteredUsers);
            }

            if (filteredUsers.length === 0) {
              emptyState.classList.remove("hidden");
              virtualContainer.classList.add("hidden");
            } else {
              emptyState.classList.add("hidden");
              virtualContainer.classList.remove("hidden");
            }
          }, 200);
        }

        // ==================== Actions ====================
        window.approveUser = (userId, userName) => {
          selectedUserId = userId;
          document.getElementById("approveUserName").textContent = userName;
          document.getElementById("approveModal").classList.remove("hidden");
        };

        window.rejectUser = (userId, userName) => {
          selectedUserId = userId;
          document.getElementById("rejectUserName").textContent = userName;
          document.getElementById("rejectModal").classList.remove("hidden");
        };

        // ==================== Toast ====================
        function showToast(message, type) {
          const toast = document.createElement("div");
          toast.className = `toast ${type}`;
          toast.innerHTML = `
          <i class="fas ${type === "success" ? "fa-check-circle" : "fa-exclamation-circle"}"></i>
          <span>${message}</span>
        `;
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 3000);
        }

        // ==================== Initialize ====================
        async function init() {
          if (!(await checkAuth())) return;

          renderSkeletonStats();

          // Load everything in parallel
          const [users] = await Promise.all([loadStats(), loadUsers()]);

          // Setup event listeners
          searchInput.addEventListener("input", filterUsers);
          roleFilter.addEventListener("change", filterUsers);

          refreshBtn.addEventListener("click", async () => {
            refreshBtn.disabled = true;
            refreshBtn.innerHTML =
              '<i class="fas fa-spinner fa-spin"></i> Refreshing...';

            await Promise.all([loadStats(), loadUsers()]);

            refreshBtn.disabled = false;
            refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh';
          });
        }

        // Start
        init();
      })();
    </script>
  </body>
</html>
