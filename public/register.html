<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>HellOOpass · Create Account</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ==================== GLOBAL STYLES ==================== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(145deg, #0a1929 0%, #1a3a4a 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        position: relative;
        overflow-x: hidden;
      }

      /* Animated background - optimized for mobile */
      body::before {
        content: "";
        position: fixed;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(
            circle at 30% 50%,
            rgba(0, 230, 200, 0.03) 0%,
            transparent 30%
          ),
          radial-gradient(
            circle at 70% 80%,
            rgba(0, 168, 132, 0.03) 0%,
            transparent 40%
          );
        animation: rotate 60s linear infinite;
        pointer-events: none;
        will-change: transform;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Floating orbs - hidden on small screens for performance */
      .orb {
        display: none;
      }

      @media (min-width: 768px) {
        .orb {
          display: block;
          position: fixed;
          width: 300px;
          height: 300px;
          border-radius: 50%;
          background: radial-gradient(
            circle at 30% 30%,
            rgba(0, 168, 132, 0.15),
            transparent 70%
          );
          filter: blur(40px);
          z-index: 0;
        }

        .orb-1 {
          top: -100px;
          right: -100px;
          background: radial-gradient(
            circle at 30% 30%,
            rgba(0, 114, 206, 0.2),
            transparent 70%
          );
        }

        .orb-2 {
          bottom: -100px;
          left: -100px;
          background: radial-gradient(
            circle at 70% 70%,
            rgba(0, 168, 132, 0.2),
            transparent 70%
          );
        }
      }

      /* ==================== MAIN CARD ==================== */
      .register-card {
        width: 100%;
        max-width: 520px;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        border-radius: 32px;
        padding: 1.8rem 1.5rem;
        box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.3);
        position: relative;
        z-index: 10;
        animation: cardFloat 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        margin: 0.5rem;
      }

      @media (min-width: 480px) {
        .register-card {
          padding: 2.5rem 2rem;
          border-radius: 40px;
        }
      }

      @keyframes cardFloat {
        0% {
          opacity: 0;
          transform: translateY(30px) scale(0.98);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Header */
      .card-header {
        text-align: center;
        margin-bottom: 1.5rem;
      }

      @media (min-width: 480px) {
        .card-header {
          margin-bottom: 2rem;
        }
      }

      .logo-wrapper {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #00a884, #0072ce);
        border-radius: 18px;
        margin-bottom: 1rem;
        box-shadow: 0 10px 20px -5px rgba(0, 168, 132, 0.3);
        transform: rotate(-5deg);
        transition: transform 0.3s ease;
        -webkit-tap-highlight-color: transparent;
      }

      @media (min-width: 480px) {
        .logo-wrapper {
          width: 70px;
          height: 70px;
          border-radius: 20px;
        }
      }

      .logo-wrapper:active {
        transform: rotate(0deg) scale(0.95);
      }

      .logo-wrapper i {
        font-size: 2rem;
        color: white;
      }

      @media (min-width: 480px) {
        .logo-wrapper i {
          font-size: 2.5rem;
        }
      }

      .card-header h1 {
        font-size: 1.8rem;
        font-weight: 800;
        background: linear-gradient(135deg, #1e293b, #0f2b3a);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.25rem;
        letter-spacing: -0.02em;
      }

      @media (min-width: 480px) {
        .card-header h1 {
          font-size: 2.2rem;
        }
      }

      .card-header p {
        color: #64748b;
        font-size: 0.9rem;
      }

      .card-header p a {
        color: #00a884;
        font-weight: 600;
        text-decoration: none;
        padding: 0.3rem;
        display: inline-block;
        -webkit-tap-highlight-color: transparent;
      }

      /* Progress Steps - Mobile Optimized */
      .progress-steps {
        display: flex;
        justify-content: space-between;
        margin-bottom: 2rem;
        position: relative;
        padding: 0 0.5rem;
      }

      .progress-steps::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 2px;
        background: #e2e8f0;
        transform: translateY(-50%);
        z-index: 1;
      }

      .step {
        position: relative;
        z-index: 2;
        background: white;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.9rem;
        color: #94a3b8;
        border: 2px solid #e2e8f0;
        transition: all 0.3s ease;
      }

      @media (min-width: 480px) {
        .step {
          width: 40px;
          height: 40px;
        }
      }

      .step.active {
        background: #00a884;
        border-color: #00a884;
        color: white;
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0, 168, 132, 0.3);
      }

      .step.completed {
        background: #10b981;
        border-color: #10b981;
        color: white;
      }

      .step-label {
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        margin-top: 0.5rem;
        font-size: 0.6rem;
        font-weight: 600;
        color: #64748b;
        white-space: nowrap;
      }

      @media (min-width: 480px) {
        .step-label {
          font-size: 0.7rem;
        }
      }

      /* ==================== FORM STYLES ==================== */
      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: #334155;
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-icon {
        position: absolute;
        left: 1rem;
        color: #94a3b8;
        font-size: 0.9rem;
        transition: all 0.2s;
        z-index: 1;
      }

      .input-field {
        width: 100%;
        padding: 0.9rem 1rem 0.9rem 2.8rem;
        border: 2px solid #e2e8f0;
        border-radius: 18px;
        font-size: 16px;
        font-weight: 500;
        color: #1e293b;
        background: white;
        transition: all 0.2s;
        -webkit-appearance: none;
      }

      .input-field:focus {
        outline: none;
        border-color: #00a884;
        box-shadow: 0 0 0 3px rgba(0, 168, 132, 0.1);
      }

      .input-field:focus + .input-icon {
        color: #00a884;
      }

      .input-field:disabled {
        background: #f8fafc;
        border-color: #cbd5e1;
        color: #64748b;
      }

      /* ==================== PASSWORD TOGGLE STYLES ==================== */
      .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
      }

      .password-wrapper .input-field {
        padding-right: 3.5rem !important;
      }

      .password-toggle {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #999;
        font-size: 1.2rem;
        padding: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s;
        z-index: 5;
        -webkit-tap-highlight-color: transparent;
        line-height: 1;
      }

      .password-toggle:hover {
        color: var(--primary-green);
      }

      .password-toggle:active {
        transform: translateY(-50%) scale(0.95);
      }

      @media (max-width: 480px) {
        .password-wrapper .input-field {
          padding-right: 3.2rem !important;
        }

        .password-toggle {
          font-size: 1.1rem;
          right: 0.8rem;
          padding: 0.4rem;
        }
      }

      /* Verify Button - Mobile Optimized */
      .verify-btn {
        position: absolute;
        right: 0.5rem;
        top: 50%;
        transform: translateY(-50%);
        background: linear-gradient(135deg, #00a884, #0072ce);
        color: white;
        border: none;
        border-radius: 30px;
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.3rem;
        box-shadow: 0 4px 10px rgba(0, 168, 132, 0.2);
        z-index: 2;
        -webkit-tap-highlight-color: transparent;
      }

      @media (min-width: 480px) {
        .verify-btn {
          padding: 0.6rem 1.3rem;
          font-size: 0.85rem;
        }
      }

      .verify-btn:active {
        transform: translateY(-50%) scale(0.95);
      }

      .verify-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* Email Sent Card - Mobile Optimized */
      .email-sent-card {
        background: linear-gradient(135deg, #f0fdf4, #f0f9ff);
        border: 1px solid rgba(0, 168, 132, 0.2);
        border-radius: 20px;
        padding: 1.5rem 1rem;
        margin-top: 1rem;
        text-align: center;
        animation: slideDownScale 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @media (min-width: 480px) {
        .email-sent-card {
          padding: 1.8rem;
        }
      }

      .sent-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #00a884, #0072ce);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        animation: pulse 2s infinite;
      }

      @media (min-width: 480px) {
        .sent-icon {
          width: 70px;
          height: 70px;
        }
      }

      .sent-icon i {
        font-size: 1.8rem;
        color: white;
      }

      @media (min-width: 480px) {
        .sent-icon i {
          font-size: 2rem;
        }
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 168, 132, 0.4);
        }
        70% {
          box-shadow: 0 0 0 15px rgba(0, 168, 132, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 168, 132, 0);
        }
      }

      .email-sent-card h3 {
        font-size: 1.2rem;
        color: #1e293b;
        margin-bottom: 0.5rem;
        font-weight: 700;
      }

      @media (min-width: 480px) {
        .email-sent-card h3 {
          font-size: 1.4rem;
        }
      }

      .email-highlight {
        background: white;
        padding: 0.3rem 0.8rem;
        border-radius: 30px;
        display: inline-block;
        color: #00a884;
        font-weight: 600;
        font-size: 0.85rem;
        margin-bottom: 1rem;
        border: 1px solid rgba(0, 168, 132, 0.2);
        word-break: break-all;
        max-width: 100%;
      }

      /* Provider Grid - Mobile Optimized */
      .provider-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.6rem;
        margin: 1rem 0;
      }

      @media (min-width: 480px) {
        .provider-grid {
          gap: 0.8rem;
        }
      }

      .provider-btn {
        padding: 0.6rem 0.3rem;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        background: white;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.3rem;
        font-weight: 500;
        font-size: 0.8rem;
        -webkit-tap-highlight-color: transparent;
      }

      @media (min-width: 480px) {
        .provider-btn {
          padding: 0.8rem;
          font-size: 0.9rem;
        }
      }

      .provider-btn:active {
        transform: scale(0.95);
      }

      /* Verification Input */
      .verification-box {
        background: #f8fafc;
        border-radius: 18px;
        padding: 1rem;
        margin-top: 1rem;
        border: 1px solid #e2e8f0;
      }

      .code-input-group {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.8rem;
        flex-wrap: wrap;
      }

      @media (max-width: 380px) {
        .code-input-group {
          flex-direction: column;
        }
      }

      .code-input {
        flex: 1;
        min-width: 120px;
        padding: 0.8rem;
        border: 2px solid #e2e8f0;
        border-radius: 14px;
        font-size: 1.1rem;
        text-align: center;
        letter-spacing: 3px;
        font-weight: 700;
        transition: all 0.2s;
      }

      .code-input:focus {
        border-color: #00a884;
        box-shadow: 0 0 0 3px rgba(0, 168, 132, 0.1);
      }

      .verify-code-btn {
        background: #10b981;
        color: white;
        border: none;
        border-radius: 14px;
        padding: 0 1.5rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        min-height: 44px;
        -webkit-tap-highlight-color: transparent;
      }

      @media (max-width: 380px) {
        .verify-code-btn {
          padding: 0.8rem;
          width: 100%;
        }
      }

      .verify-code-btn:active {
        transform: scale(0.95);
      }

      .resend-link {
        color: #00a884;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        display: inline-block;
        padding: 0.5rem 0;
        -webkit-tap-highlight-color: transparent;
      }

      .resend-link:active {
        opacity: 0.7;
      }

      .resend-link.disabled {
        color: #94a3b8;
        pointer-events: none;
      }

      /* Verified Badge */
      .verified-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.4rem 0.8rem;
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
        border-radius: 30px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-top: 0.5rem;
        animation: popIn 0.3s;
      }

      /* Password Strength */
      .password-strength {
        margin-top: 0.5rem;
        height: 4px;
        background: #e2e8f0;
        border-radius: 2px;
        overflow: hidden;
      }

      .strength-bar {
        height: 100%;
        width: 0;
        transition:
          width 0.3s,
          background-color 0.3s;
      }

      .strength-weak {
        background: #ef4444;
      }
      .strength-fair {
        background: #f59e0b;
      }
      .strength-good {
        background: #3b82f6;
      }
      .strength-strong {
        background: #10b981;
      }

      .strength-text {
        font-size: 0.7rem;
        margin-top: 0.3rem;
        text-align: right;
      }

      .password-match {
        font-size: 0.7rem;
        margin-top: 0.3rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .match-success {
        color: #10b981;
      }
      .match-error {
        color: #ef4444;
      }

      /* Terms Checkbox */
      .terms-group {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        margin: 1.5rem 0;
        padding: 0.5rem;
      }

      .terms-group input[type="checkbox"] {
        width: 1.2rem;
        height: 1.2rem;
        accent-color: #00a884;
        cursor: pointer;
        flex-shrink: 0;
      }

      .terms-group label {
        font-size: 0.85rem;
        color: #475569;
        cursor: pointer;
        line-height: 1.4;
      }

      .terms-group a {
        color: #00a884;
        font-weight: 600;
        text-decoration: none;
      }

      /* Register Button */
      .register-btn {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #1e293b, #0f2b3a);
        color: white;
        border: none;
        border-radius: 40px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        min-height: 52px;
        -webkit-tap-highlight-color: transparent;
      }

      .register-btn:active {
        transform: scale(0.98);
      }

      .register-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      /* Messages */
      .message {
        padding: 0.8rem 1rem;
        border-radius: 18px;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 1.2rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        animation: slideDown 0.3s;
      }

      .message.error {
        background: #fef2f2;
        color: #b91c1c;
        border-left: 4px solid #ef4444;
      }

      .message.success {
        background: #f0fdf4;
        color: #166534;
        border-left: 4px solid #22c55e;
      }

      .hidden {
        display: none !important;
      }

      /* Touch-friendly adjustments */
      button,
      a,
      input[type="checkbox"] {
        touch-action: manipulation;
      }

      /* Prevent zoom on input focus for iOS */
      @supports (-webkit-touch-callout: none) {
        input,
        select,
        textarea {
          font-size: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="register-card">
      <div class="card-header">
        <div class="logo-wrapper">
          <i class="fas fa-cloud-sun"></i>
        </div>
        <h1>Create Account</h1>
        <p>Already have an account? <a href="/login.html">Sign in</a></p>
      </div>

      <!-- Progress Steps -->
      <div class="progress-steps">
        <div class="step active" id="step1">
          1
          <span class="step-label">Email</span>
        </div>
        <div class="step" id="step2">
          2
          <span class="step-label">Details</span>
        </div>
        <div class="step" id="step3">
          3
          <span class="step-label">Complete</span>
        </div>
      </div>

      <div id="message" class="message hidden"></div>

      <form id="registerForm">
        <!-- Step 1: Email Verification -->
        <div id="step1-content">
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-envelope"></i> Email Address
            </label>
            <div class="input-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input
                type="email"
                id="email"
                class="input-field"
                placeholder="you@example.com"
                required
              />
              <button type="button" class="verify-btn" id="verifyEmailBtn">
                <i class="fas fa-paper-plane"></i> Send
              </button>
            </div>
          </div>

          <!-- Email Sent Card -->
          <div id="emailSentCard" class="email-sent-card hidden">
            <div class="sent-icon">
              <i class="fas fa-envelope-open-text"></i>
            </div>
            <h3>Check Your Inbox</h3>
            <div class="email-highlight" id="sentEmail"></div>
            <p style="color: #475569; margin-bottom: 1rem">
              We've sent a 6-digit verification code
            </p>

            <div class="provider-grid">
              <button
                type="button"
                onclick="openGmail()"
                class="provider-btn gmail"
              >
                <i class="fab fa-google"></i> Gmail
              </button>
              <button
                type="button"
                onclick="openOutlook()"
                class="provider-btn outlook"
              >
                <i class="fab fa-microsoft"></i> Outlook
              </button>
              <button
                type="button"
                onclick="openYahoo()"
                class="provider-btn yahoo"
              >
                <i class="fab fa-yahoo"></i> Yahoo
              </button>
              <button
                type="button"
                onclick="openProton()"
                class="provider-btn proton"
              >
                <i class="fas fa-shield"></i> Proton
              </button>
            </div>
          </div>

          <!-- Verification Input -->
          <div id="emailVerification" class="verification-box hidden">
            <div class="code-input-group">
              <input
                type="text"
                id="emailCode"
                class="code-input"
                placeholder="000000"
                maxlength="6"
                inputmode="numeric"
                pattern="[0-9]*"
              />
              <button
                type="button"
                class="verify-code-btn"
                id="verifyEmailCode"
              >
                Verify
              </button>
            </div>
            <div class="resend-link" id="resendEmailCode">Resend code</div>
          </div>

          <div id="emailVerified" class="verified-badge hidden">
            <i class="fas fa-check-circle"></i> Email Verified
          </div>
        </div>

        <!-- Step 2: Personal Details -->
        <div id="step2-content" class="hidden">
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-user"></i> Full Name
            </label>
            <div class="input-wrapper">
              <i class="fas fa-user input-icon"></i>
              <input
                type="text"
                id="fullname"
                class="input-field"
                placeholder="John Doe"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-lock"></i> Password
            </label>
            <div class="password-wrapper">
              <i
                class="fas fa-lock"
                style="
                  position: absolute;
                  left: 1rem;
                  color: #94a3b8;
                  z-index: 1;
                "
              ></i>
              <input
                type="password"
                id="password"
                class="input-field"
                placeholder="Create strong password"
                required
              />
              <button type="button" class="password-toggle" id="togglePassword">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="password-strength">
              <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-text" id="strengthText"></div>
          </div>

          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-lock"></i> Confirm Password
            </label>
            <div class="password-wrapper">
              <i
                class="fas fa-lock"
                style="
                  position: absolute;
                  left: 1rem;
                  color: #94a3b8;
                  z-index: 1;
                "
              ></i>
              <input
                type="password"
                id="confirmPassword"
                class="input-field"
                placeholder="Re-enter password"
                required
              />
              <button
                type="button"
                class="password-toggle"
                id="toggleConfirmPassword"
              >
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="password-match" id="passwordMatch"></div>
          </div>

          <div class="terms-group">
            <input type="checkbox" id="terms" />
            <label for="terms">
              I agree to the <a href="#">Terms</a> and <a href="#">Privacy</a>
            </label>
          </div>
        </div>

        <!-- Step 3: Success -->
        <div id="step3-content" class="hidden">
          <div style="text-align: center; padding: 1.5rem">
            <div class="sent-icon" style="margin: 0 auto 1.5rem">
              <i class="fas fa-check"></i>
            </div>
            <h3 style="color: #1e293b; margin-bottom: 0.5rem">
              Registration Complete!
            </h3>
            <p style="color: #64748b; margin-bottom: 1rem">
              Your account has been created successfully
            </p>
            <p style="color: #475569">Redirecting to login...</p>
          </div>
        </div>

        <button type="submit" class="register-btn" id="registerBtn">
          <span>Continue</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>
    </div>

    <script>
      // ==================== DOM Elements ====================
      const messageDiv = document.getElementById("message");
      const step1 = document.getElementById("step1");
      const step2 = document.getElementById("step2");
      const step3 = document.getElementById("step3");
      const step1Content = document.getElementById("step1-content");
      const step2Content = document.getElementById("step2-content");
      const step3Content = document.getElementById("step3-content");
      const verifyEmailBtn = document.getElementById("verifyEmailBtn");
      const emailSentCard = document.getElementById("emailSentCard");
      const emailVerification = document.getElementById("emailVerification");
      const emailCode = document.getElementById("emailCode");
      const verifyEmailCode = document.getElementById("verifyEmailCode");
      const resendEmailCode = document.getElementById("resendEmailCode");
      const emailVerified = document.getElementById("emailVerified");
      const emailInput = document.getElementById("email");
      const sentEmail = document.getElementById("sentEmail");
      const fullnameInput = document.getElementById("fullname");
      const passwordInput = document.getElementById("password");
      const confirmInput = document.getElementById("confirmPassword");
      const strengthBar = document.getElementById("strengthBar");
      const strengthText = document.getElementById("strengthText");
      const passwordMatch = document.getElementById("passwordMatch");
      const termsCheck = document.getElementById("terms");
      const registerBtn = document.getElementById("registerBtn");

      // Password toggle buttons
      const togglePassword = document.getElementById("togglePassword");
      const toggleConfirmPassword = document.getElementById(
        "toggleConfirmPassword",
      );

      // ==================== Password Toggle Functions ====================
      function setupPasswordToggle(toggleButton, passwordField) {
        if (toggleButton && passwordField) {
          toggleButton.addEventListener("click", function (e) {
            e.preventDefault();
            const type =
              passwordField.getAttribute("type") === "password"
                ? "text"
                : "password";
            passwordField.setAttribute("type", type);
            this.innerHTML =
              type === "password"
                ? '<i class="fas fa-eye"></i>'
                : '<i class="fas fa-eye-slash"></i>';
            passwordField.focus();
          });
        }
      }

      // Initialize password toggles
      setupPasswordToggle(togglePassword, passwordInput);
      setupPasswordToggle(toggleConfirmPassword, confirmInput);

      // ==================== State ====================
      let isEmailVerified = false;
      let verificationTimer;
      let timeLeft = 60;
      let detectionInterval;

      // ==================== Message Helpers ====================
      function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        messageDiv.classList.remove("hidden");
        setTimeout(() => messageDiv.classList.add("hidden"), 5000);
      }

      function showError(text) {
        showMessage(text, "error");
      }
      function showSuccess(text) {
        showMessage(text, "success");
      }

      // ==================== Email Provider Functions ====================
      window.openGmail = () => window.open("https://mail.google.com", "_blank");
      window.openOutlook = () =>
        window.open("https://outlook.live.com", "_blank");
      window.openYahoo = () => window.open("https://mail.yahoo.com", "_blank");
      window.openProton = () => window.open("https://mail.proton.me", "_blank");

      // ==================== Password Strength ====================
      function checkPasswordStrength(password) {
        if (!password) return { score: 0, text: "", class: "" };
        let score = 0;
        if (password.length >= 8) score++;
        if (password.match(/[a-z]/)) score++;
        if (password.match(/[A-Z]/)) score++;
        if (password.match(/[0-9]/)) score++;
        if (password.match(/[^a-zA-Z0-9]/)) score++;
        if (score <= 2) return { score, text: "Weak", class: "strength-weak" };
        if (score === 3) return { score, text: "Fair", class: "strength-fair" };
        if (score === 4) return { score, text: "Good", class: "strength-good" };
        return { score, text: "Strong", class: "strength-strong" };
      }

      passwordInput.addEventListener("input", () => {
        const strength = checkPasswordStrength(passwordInput.value);
        strengthBar.style.width = `${(strength.score / 5) * 100}%`;
        strengthBar.className = `strength-bar ${strength.class}`;
        strengthText.textContent = passwordInput.value ? strength.text : "";
      });

      // ==================== Password Match ====================
      function checkPasswordMatch() {
        if (!confirmInput.value) {
          passwordMatch.innerHTML = "";
          return;
        }
        if (passwordInput.value === confirmInput.value) {
          passwordMatch.innerHTML =
            '<i class="fas fa-check-circle match-success"></i> <span class="match-success">Passwords match</span>';
        } else {
          passwordMatch.innerHTML =
            '<i class="fas fa-exclamation-circle match-error"></i> <span class="match-error">Passwords do not match</span>';
        }
      }

      passwordInput.addEventListener("input", checkPasswordMatch);
      confirmInput.addEventListener("input", checkPasswordMatch);

      // ==================== Timer ====================
      function startTimer() {
        timeLeft = 60;
        resendEmailCode.classList.add("disabled");
        resendEmailCode.textContent = `Resend (${timeLeft}s)`;
        verificationTimer = setInterval(() => {
          timeLeft--;
          resendEmailCode.textContent = `Resend (${timeLeft}s)`;
          if (timeLeft <= 0) {
            clearInterval(verificationTimer);
            resendEmailCode.classList.remove("disabled");
            resendEmailCode.textContent = "Resend code";
          }
        }, 1000);
      }

      // ==================== Auto Code Detection ====================
      function startCodeDetection() {
        if (detectionInterval) clearInterval(detectionInterval);
        detectionInterval = setInterval(() => {
          if (emailCode.value.length === 6 && !isEmailVerified) {
            setTimeout(() => {
              if (emailCode.value.length === 6) verifyEmailCode.click();
            }, 500);
          }
        }, 500);
      }

      // ==================== Send Verification Code ====================
      verifyEmailBtn.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        if (!email) return showError("Please enter your email first");
        if (!email.includes("@") || !email.includes("."))
          return showError("Enter a valid email");

        verifyEmailBtn.disabled = true;
        verifyEmailBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> Sending...';

        try {
          const response = await fetch("/api/verification/send-email-code", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.message || "Failed to send");

          sentEmail.textContent = email;
          emailSentCard.classList.remove("hidden");
          emailVerification.classList.remove("hidden");
          startCodeDetection();
          startTimer();
          showSuccess(`Code sent to ${email}`);
        } catch (error) {
          showError(error.message);
        } finally {
          verifyEmailBtn.disabled = false;
          verifyEmailBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send';
        }
      });

      // ==================== Verify Code ====================
      verifyEmailCode.addEventListener("click", async () => {
        const code = emailCode.value.trim();
        const email = emailInput.value.trim();
        if (!code || code.length !== 6) return showError("Enter 6-digit code");

        verifyEmailCode.disabled = true;
        verifyEmailCode.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
          const response = await fetch("/api/verification/verify-email-code", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, code }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.message || "Invalid code");

          isEmailVerified = true;
          emailVerified.classList.remove("hidden");
          emailInput.disabled = true;
          emailSentCard.classList.add("hidden");
          emailVerification.classList.add("hidden");
          resendEmailCode.classList.add("hidden");
          verifyEmailBtn.style.display = "none";
          clearInterval(verificationTimer);
          clearInterval(detectionInterval);

          step1.classList.remove("active");
          step1.classList.add("completed");
          step2.classList.add("active");
          step1Content.classList.add("hidden");
          step2Content.classList.remove("hidden");
          registerBtn.innerHTML =
            '<span>Create Account</span><i class="fas fa-user-plus"></i>';
          showSuccess("Email verified! Complete your details.");
        } catch (error) {
          showError(error.message);
          emailCode.value = "";
        } finally {
          verifyEmailCode.disabled = false;
          verifyEmailCode.innerHTML = "Verify";
        }
      });

      // ==================== Resend Code ====================
      resendEmailCode.addEventListener("click", () => {
        if (!resendEmailCode.classList.contains("disabled"))
          verifyEmailBtn.click();
      });

      // ==================== Form Submission ====================
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          if (!step2Content.classList.contains("hidden")) {
            const fullname = fullnameInput.value.trim();
            if (!fullname || !passwordInput.value || !confirmInput.value)
              return showError("All fields required");
            if (passwordInput.value !== confirmInput.value)
              return showError("Passwords don't match");
            if (!termsCheck.checked) return showError("You must accept terms");

            const strength = checkPasswordStrength(passwordInput.value);
            if (strength.score <= 2)
              return showError("Choose a stronger password");

            registerBtn.disabled = true;
            registerBtn.innerHTML =
              '<i class="fas fa-spinner fa-spin"></i> Creating...';

            try {
              const nameParts = fullname.split(" ");
              const response = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  firstName: nameParts[0],
                  lastName: nameParts.slice(1).join(" ") || "User",
                  email: emailInput.value.trim(),
                  password: passwordInput.value,
                  terms: termsCheck.checked ? ["terms1"] : [],
                }),
              });
              const data = await response.json();
              if (!response.ok)
                throw new Error(data.message || "Registration failed");

              step2.classList.remove("active");
              step2.classList.add("completed");
              step3.classList.add("active");
              step2Content.classList.add("hidden");
              step3Content.classList.remove("hidden");
              registerBtn.classList.add("hidden");
              setTimeout(() => (window.location.href = "/login.html"), 3000);
            } catch (error) {
              showError(error.message);
              registerBtn.disabled = false;
              registerBtn.innerHTML =
                '<span>Create Account</span><i class="fas fa-user-plus"></i>';
            }
          }
        });

      // ==================== Mobile Optimization ====================
      if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        document.querySelectorAll("input").forEach((input) => {
          input.addEventListener("focus", function () {
            this.style.fontSize = "16px";
          });
        });
      }
    </script>
  </body>
</html>
